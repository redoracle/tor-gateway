name: Monthly Docker Build & Release

on:
  # Run on the first day of every month at midnight UTC
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set Version (current date)
        id: set_version
        run: echo "version=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tor-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tor-gateway:${{ steps.set_version.outputs.version }}
            ghcr.io/${{ github.actor }}/tor-gateway:latest
            ghcr.io/${{ github.actor }}/tor-gateway:${{ steps.set_version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set_version.outputs.version }}
          name: "Release ${{ steps.set_version.outputs.version }}"
          body: "New release generated on ${{ steps.set_version.outputs.version }}."
          draft: false
          prerelease: false
      # - name: Send Telegram Message
      #   uses: appleboy/telegram-action@master
      #   with:
      #     to: ${{ secrets.TELEGRAM_CHAT_ID }}
      #     token: ${{ secrets.TELEGRAM_TOKEN }}
      #     message: "New Tor Gateway Release: ${{ steps.set_version.outputs.version }} has been deployed."
